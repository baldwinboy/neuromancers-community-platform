<div class="color-picker-container" data-color-picker>
    <input type="hidden"
           name="{{ widget.name }}"
           id="{{ widget.attrs.id }}"
           value="{{ widget.value|default:'' }}"
           class="color-picker-value" />
    <div class="color-picker-display">
        <div class="color-picker-preview"
             style="background-color: {{ widget.value|default:'transparent' }}"
             data-preview></div>
        <span class="color-picker-label" data-label>{{ widget.value|default:'Select color' }}</span>
        <button type="button"
                class="color-picker-toggle"
                data-toggle
                aria-label="Toggle color picker">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
                <path d="M8 12L3 7h10l-5 5z" />
            </svg>
        </button>
    </div>
    <div class="color-picker-dropdown" data-dropdown hidden>
        <div class="color-picker-grid">
            {% for choice in widget.color_choices %}
                <button type="button"
                        class="color-picker-swatch{% if choice.0 == widget.value %} selected{% endif %}"
                        data-value="{{ choice.0 }}"
                        data-color="{{ choice.2|default:choice.0 }}"
                        title="{{ choice.1 }}"
                        aria-label="{{ choice.1 }}"
                        style="background-color: {{ choice.2|default:choice.0 }};
                               {% if choice.0 == 'transparent' %} background-image: linear-gradient(45deg, #ccc 25%, transparent 25%), linear-gradient(-45deg, #ccc 25%, transparent 25%), linear-gradient(45deg, transparent 75%, #ccc 75%), linear-gradient(-45deg, transparent 75%, #ccc 75%);
                               background-size: 8px 8px;
                               background-position: 0 0, 0 4px, 4px -4px, -4px 0px;
                               {% endif %}">
                    {% if choice.0 == widget.value %}
                        <svg width="12"
                             height="12"
                             viewBox="0 0 16 16"
                             fill="currentColor"
                             style="filter: drop-shadow(0 0 1px rgba(0,0,0,0.5))">
                            <path d="M13.78 4.22a.75.75 0 010 1.06l-7.25 7.25a.75.75 0 01-1.06 0L2.22 9.28a.75.75 0 011.06-1.06L6 10.94l6.72-6.72a.75.75 0 011.06 0z" />
                        </svg>
                    {% endif %}
                </button>
            {% endfor %}
        </div>
        <div class="color-picker-custom">
            <label class="color-picker-custom-label">
                Custom Color:
                <div class="color-picker-custom-input-wrapper">
                    <input type="color"
                           class="color-picker-custom-input"
                           data-custom-color
                           value="#{{ widget.value|default:'000000' }}" />
                    <input type="text"
                           class="color-picker-custom-text"
                           data-custom-text
                           placeholder="#RRGGBB or hsl(...)"
                           value="{% if widget.value and '#' in widget.value or 'hsl' in widget.value %}{{ widget.value }}{% endif %}" />
                    <button type="button" class="color-picker-apply" data-apply>Apply</button>
                </div>
            </label>
        </div>
    </div>
</div>
