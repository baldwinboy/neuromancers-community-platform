- name: Setup Coolify
  hosts: all
  become: true
  collections:
    - community.general
    - community.crypto
    - community.docker
    - ansible.posix

  tasks:
    # Preflight check
    - name: Check if Coolify API is enabled
      ansible.builtin.uri:
        url: "{{ coolify_healthcheck_url }}"
        method: GET
      register: coolify_health

    - name: Set Coolify API token
      ansible.builtin.set_fact:
        coolify_api_token: "{{ coolify_admin_token | default(lookup('ansible.builtin.env', 'COOLIFY_ADMIN_TOKEN', default=undef())) }}"
      when: coolify_health.status == 200

    # Get the Coolify host server as JSON
    - name: List Coolify servers
      ansible.builtin.uri:
        url: "{{ coolify_api_url }}/servers"
        method: GET
        headers:
          Authorization: "Bearer {{ coolify_api_token }}"
        status_code: 200
        return_content: true
      register: coolify_server_list

    - name: Get Coolify host server object
      ansible.builtin.set_fact:
        coolify_server: "{{ coolify_server_list.json | selectattr('is_coolify_host') | selectattr('is_reachable') | first | default(undef()) }}"
      when: coolify_server_list is defined
      failed_when: coolify_server is undefined

    # Get or create `neuromancers` project
    - name: List Coolify projects
      ansible.builtin.uri:
        url: "{{ coolify_api_url }}/projects"
        method: GET
        headers:
          Authorization: "Bearer {{ coolify_api_token }}"
        status_code: 200
        return_content: true
      register: coolify_project_list
      retries: 3
      delay: 2

    - name: Get `neuromancers` project
      ansible.builtin.set_fact:
        coolify_project: "{{ coolify_project_list.json | selectattr('name', 'eq', 'neuromancers') | first | default(undef()) }}"
      when: coolify_project_list is defined

    - name: Create `neuromancers` project if not exists
      ansible.builtin.uri:
        url: "{{ coolify_api_url }}/projects"
        method: POST
        headers:
          Authorization: "Bearer {{ coolify_api_token }}"
        return_content: true
        body_format: json
        body:
          name: "neuromancers"
          description: "NEUROMANCERS Network"
        status_code: 201
      register: created_coolify_project
      when: coolify_project is undefined

    - name: Set project UUID
      ansible.builtin.set_fact:
        coolify_project_uuid: "{{ created_coolify_project.json.uuid if created_coolify_project is defined else coolify_project.uuid }}"

    # Get or create environment for `neuromancers` project
    - name: List Coolify environments
      ansible.builtin.uri:
        url: "{{ coolify_api_url }}/projects/{{ coolify_project_uuid }}/environments"
        method: GET
        headers:
          Authorization: "Bearer {{ coolify_api_token }}"
        status_code: 200
        return_content: true
      register: coolify_environment_list
      retries: 3
      delay: 2

    - name: Get `neuromancers` environment
      ansible.builtin.set_fact:
        coolify_environment: "{{ coolify_environment_list.json | selectattr('name', 'eq', 'neuromancers') | first | default(undef()) }}"
      when: coolify_environment_list is defined

    - name: Create `neuromancers` environment if not exists
      ansible.builtin.uri:
        url: "{{ coolify_api_url }}/projects/{{ coolify_project_uuid }}/environments"
        method: POST
        headers:
          Authorization: "Bearer {{ coolify_api_token }}"
        return_content: true
        body_format: json
        body:
          name: "{{ git_environment }}"
        status_code: 201
      register: created_coolify_environment
      when: coolify_environment is undefined

    # Get or create application for `neuromancers` environment
    - name: List Coolify applications
      ansible.builtin.uri:
        url: "{{ coolify_api_url }}/applications"
        method: GET
        headers:
          Authorization: "Bearer {{ coolify_api_token }}"
        status_code: 200
        return_content: true
      register: coolify_application_list
      retries: 3
      delay: 2

    - name: Get `neuromancers_network` application
      ansible.builtin.set_fact:
        coolify_application: "{{ coolify_application_list.json | selectattr('name', 'eq', 'neuromancers_network') | first | default(undef()) }}"
      when: coolify_application_list is defined

    - name: Create `neuromancers_network` application if not exists
      ansible.builtin.uri:
        url: "{{ coolify_api_url }}/applications/public"
        method: POST
        headers:
          Authorization: "Bearer {{ coolify_api_token }}"
        return_content: true
        body_format: json
        body:
          project_uuid: "{{ coolify_project_uuid }}"
          server_uuid: "{{ coolify_server.uuid }}"
          environment_name: "{{ git_environment }}"
          git_repository: "{{ git_repository }}"
          git_branch: "{{ git_branch }}"
          build_pack: "dockercompose"
          ports_exposes: "5000"
          name: "neuromancers_network"
          description: "NEUROMANCERS Network"
          instant_deploy: true
          git_commit_sha: "{{ git_commit_sha }}"
          docker_compose_location: "docker-compose.coolify.yml"
          health_check_enabled: true
          health_check_path: "/api/health"
          health_check_port: "5000"
          health_check_method: "GET"
          health_check_return_code: 200
          health_check_interval: 30
          health_check_timeout: 10
          health_check_retries: 3
          health_check_start_period: 60
        status_code: 201
      register: created_coolify_application
      when: coolify_application is undefined

    - name: Set application UUID
      ansible.builtin.set_fact:
        coolify_application_uuid: "{{ (created_coolify_application.json.uuid if coolify_application is undefined else coolify_application.uuid) | default(undef()) }}"

    - name: Push BWS_ACCESS_TOKEN to Coolify application
      ansible.builtin.uri:
        url: "{{ coolify_api_url }}/applications/{{ coolify_application_uuid }}/envs"
        method: POST
        headers:
          Authorization: "Bearer {{ coolify_api_token }}"
        body_format: json
        body:
          key: "BWS_ACCESS_TOKEN"
          value: "{{ lookup('ansible.builtin.env', 'BWS_ACCESS_TOKEN') }}"
          is_build_time: false
          is_literal: true
        status_code: 201
      when: coolify_application_uuid is defined

    - name: Push DOCKER_TAG to Coolify application
      ansible.builtin.uri:
        url: "{{ coolify_api_url }}/applications/{{ coolify_application_uuid }}/envs"
        method: POST
        headers:
          Authorization: "Bearer {{ coolify_api_token }}"
        body_format: json
        body:
          key: "DOCKER_TAG"
          value: "{{ 'staging' if git_environment == 'staging' else 'latest' }}"
          is_build_time: false
          is_literal: true
        status_code: 201
      when: coolify_application_uuid is defined
