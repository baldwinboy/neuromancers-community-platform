- name: Setup Coolify
  hosts: all
  become: true
  collections:
    - community.general
    - community.crypto
    - community.docker
    - ansible.posix

  tasks:
    # Preflight check
    - name: Check if Coolify API is enabled
      ansible.builtin.uri:
        url: "{{ coolify_healthcheck_url }}"
        method: GET
      register: coolify_health

    - name: Set Coolify API token
      ansible.builtin.set_fact:
        coolify_api_token: "{{ coolify_admin_token | default(lookup('ansible.builtin.env', 'COOLIFY_ADMIN_TOKEN', default=undef())) }}"
      when: coolify_health.status == 200

    - name: Set BWS access token
      ansible.builtin.set_fact:
        bws_access_token: "{{ BWS_ACCESS_TOKEN | default(lookup('env', 'BWS_ACCESS_TOKEN', default='')) }}"
      when: coolify_health.status == 200

    # Get the Coolify host server as JSON
    - name: List Coolify servers
      ansible.builtin.uri:
        url: "{{ coolify_api_url }}/servers"
        method: GET
        headers:
          Authorization: "Bearer {{ coolify_api_token }}"
        status_code: 200
        return_content: true
      register: coolify_server_list

    - name: Get Coolify host server object
      ansible.builtin.set_fact:
        coolify_server: "{{ coolify_server_list.json | selectattr('is_coolify_host') | selectattr('is_reachable') | first | default('') }}"
      when: coolify_server_list is defined
      failed_when: coolify_server == ''

    # Get or create `neuromancers` project
    - name: List Coolify projects
      ansible.builtin.uri:
        url: "{{ coolify_api_url }}/projects"
        method: GET
        headers:
          Authorization: "Bearer {{ coolify_api_token }}"
        status_code: 200
        return_content: true
      register: coolify_project_list
      retries: 3
      delay: 2

    - name: Get `neuromancers` project
      ansible.builtin.set_fact:
        coolify_project: "{{ coolify_project_list.json | selectattr('name', 'eq', 'neuromancers') | first | default('') }}"
      when: coolify_project_list is defined

    - name: Create `neuromancers` project if not exists
      ansible.builtin.uri:
        url: "{{ coolify_api_url }}/projects"
        method: POST
        headers:
          Authorization: "Bearer {{ coolify_api_token }}"
        return_content: true
        body_format: json
        body:
          name: "neuromancers"
          description: "NEUROMANCERS Network"
        status_code: 201
      register: created_coolify_project
      when: not coolify_project

    - name: Set project UUID from existing project
      ansible.builtin.set_fact:
        coolify_project_uuid: "{{ coolify_project.uuid }}"
      when: (coolify_project | default('')) != ''

    - name: Set project UUID from created project
      ansible.builtin.set_fact:
        coolify_project_uuid: "{{ created_coolify_project.json.uuid }}"
      when: (coolify_project | default('')) == ''

    # Get or create environment for `neuromancers` project
    - name: List Coolify environments
      ansible.builtin.uri:
        url: "{{ coolify_api_url }}/projects/{{ coolify_project_uuid }}/environments"
        method: GET
        headers:
          Authorization: "Bearer {{ coolify_api_token }}"
        status_code: 200
        return_content: true
      register: coolify_environment_list
      retries: 3
      delay: 2

    - name: Get `neuromancers` environment
      ansible.builtin.set_fact:
        coolify_environment: "{{ coolify_environment_list.json | selectattr('name', 'eq', 'neuromancers') | first | default('') }}"
      when: coolify_environment_list is defined

    - name: Create `neuromancers` environment if not exists
      ansible.builtin.uri:
        url: "{{ coolify_api_url }}/projects/{{ coolify_project_uuid }}/environments"
        method: POST
        headers:
          Authorization: "Bearer {{ coolify_api_token }}"
        return_content: true
        body_format: json
        body:
          name: "neuromancers"
        status_code: 201
      register: created_coolify_environment
      when: not coolify_environment

    # Get or create application for `neuromancers` environment
    - name: List Coolify applications
      ansible.builtin.uri:
        url: "{{ coolify_api_url }}/applications"
        method: GET
        headers:
          Authorization: "Bearer {{ coolify_api_token }}"
        status_code: 200
        return_content: true
      register: coolify_application_list
      retries: 3
      delay: 2

    - name: Get `neuromancers_network` application
      ansible.builtin.set_fact:
        coolify_application: "{{ coolify_application_list.json | selectattr('name', 'eq', 'neuromancers_network') | first | default('') }}"
      when: coolify_application_list is defined

    - name: Create `neuromancers_network` application if not exists
      ansible.builtin.uri:
        url: "{{ coolify_api_url }}/applications/public"
        method: POST
        headers:
          Authorization: "Bearer {{ coolify_api_token }}"
        return_content: true
        body_format: json
        body:
          project_uuid: "{{ coolify_project_uuid }}"
          server_uuid: "{{ coolify_server.uuid }}"
          environment_name: "neuromancers"
          git_repository: "{{ git_repository }}"
          git_branch: "{{ git_branch }}"
          build_pack: "dockercompose"
          ports_exposes: "5000"
          name: "neuromancers_network"
          description: "NEUROMANCERS Network"
          instant_deploy: false
          git_commit_sha: "{{ git_commit_sha }}"
          docker_compose_location: "/docker-compose.coolify.yml"
          health_check_enabled: true
          health_check_path: "/api/health"
          health_check_port: "5000"
          health_check_method: "GET"
          health_check_return_code: 200
          health_check_interval: 30
          health_check_timeout: 10
          health_check_retries: 3
          health_check_start_period: 60
        status_code: 201
      register: created_coolify_application
      when: not coolify_application

    - name: Set application UUID from existing application
      ansible.builtin.set_fact:
        coolify_application_uuid: "{{ coolify_application.uuid }}"
      when: (coolify_application | default('')) != ''

    - name: Set application UUID from created application
      ansible.builtin.set_fact:
        coolify_application_uuid: "{{ created_coolify_application.json.uuid }}"
      when: (coolify_application | default('')) == ''

    - name: List existing envs for application
      ansible.builtin.uri:
        url: "{{ coolify_api_url }}/applications/{{ coolify_application_uuid }}/envs"
        method: GET
        headers:
          Authorization: "Bearer {{ coolify_api_token }}"
        status_code: 200
        return_content: true
      register: coolify_application_envs
      when: coolify_application_uuid | default('') != ''

    - name: Set existing env vars fact
      ansible.builtin.set_fact:
        coolify_env_vars: "{{ coolify_application_envs.json | default([]) }}"
      when: coolify_application_envs is defined and coolify_application_envs.status == 200

    - name: Set existing BWS_ACCESS_TOKEN env
      ansible.builtin.set_fact:
        existing_bws_token: "{{ coolify_env_vars | selectattr('key', 'eq', 'BWS_ACCESS_TOKEN') | first | default('') }}"
      when: coolify_env_vars is defined

    - name: Set existing DOCKER_TAG env
      ansible.builtin.set_fact:
        existing_docker_tag: "{{ coolify_env_vars | selectattr('key', 'eq', 'DOCKER_TAG') | first | default('') }}"
      when: coolify_env_vars is defined

    - name: Create BWS_ACCESS_TOKEN env
      ansible.builtin.uri:
        url: "{{ coolify_api_url }}/applications/{{ coolify_application_uuid }}/envs"
        method: POST
        headers:
          Authorization: "Bearer {{ coolify_api_token }}"
        body_format: json
        body:
          key: "BWS_ACCESS_TOKEN"
          value: "{{ bws_access_token }}"
          is_literal: true
          is_preview: false
        status_code: 201
      when:
        - coolify_application_uuid | default('') != ''
        - existing_bws_token | default('') == ''
        - bws_access_token | default('') != ''

    - name: Update BWS_ACCESS_TOKEN env
      ansible.builtin.uri:
        url: "{{ coolify_api_url }}/applications/{{ coolify_application_uuid }}/envs"
        method: PATCH
        headers:
          Authorization: "Bearer {{ coolify_api_token }}"
        body_format: json
        body:
          key: "BWS_ACCESS_TOKEN"
          value: "{{ bws_access_token }}"
          is_literal: true
          is_preview: false
        status_code: 201
      when:
        - coolify_application_uuid | default('') != ''
        - existing_bws_token | default('') != ''
        - bws_access_token | default('') != ''

    - name: Create DOCKER_TAG env
      ansible.builtin.uri:
        url: "{{ coolify_api_url }}/applications/{{ coolify_application_uuid }}/envs"
        method: POST
        headers:
          Authorization: "Bearer {{ coolify_api_token }}"
        body_format: json
        body:
          key: "DOCKER_TAG"
          value: "{{ 'staging' if git_environment == 'staging' else 'latest' }}"
          is_literal: true
          is_preview: false
        status_code: 201
      when:
        - coolify_application_uuid | default('') != ''
        - existing_docker_tag | default('') == ''

    - name: Update DOCKER_TAG env
      ansible.builtin.uri:
        url: "{{ coolify_api_url }}/applications/{{ coolify_application_uuid }}/envs"
        method: PATCH
        headers:
          Authorization: "Bearer {{ coolify_api_token }}"
        body_format: json
        body:
          key: "DOCKER_TAG"
          value: "{{ 'staging' if git_environment == 'staging' else 'latest' }}"
          is_literal: true
          is_preview: false
        status_code: 201
      when:
        - coolify_application_uuid | default('') != ''
        - existing_docker_tag | default('') != ''

    # ── Postgres & AWS secrets from Bitwarden ──────────────────────────────
    # These are injected as plain-text env vars so the Postgres container
    # (which has no entrypoint) receives them directly from Coolify.

    - name: Resolve secrets from Bitwarden Secrets Manager
      ansible.builtin.shell: bws secret list
      environment:
        BWS_ACCESS_TOKEN: "{{ bws_access_token }}"
      register: bws_secrets_raw
      when: bws_access_token | default('') != ''

    - name: Parse BWS secrets
      ansible.builtin.set_fact:
        bws_secrets: "{{ (bws_secrets_raw.stdout | from_json) if bws_secrets_raw is defined and bws_secrets_raw.stdout is defined else [] }}"

    - name: Extract secret values from BWS
      ansible.builtin.set_fact:
        bws_postgres_db: "{{ bws_secrets | selectattr('key', 'eq', 'POSTGRES_DB') | map(attribute='value') | first | default('neuromancers_network') }}"
        bws_postgres_user: "{{ bws_secrets | selectattr('key', 'eq', 'POSTGRES_USER') | map(attribute='value') | first | default('') }}"
        bws_postgres_password: "{{ bws_secrets | selectattr('key', 'eq', 'POSTGRES_PASSWORD') | map(attribute='value') | first | default('') }}"
        bws_aws_access_key_id: "{{ bws_secrets | selectattr('key', 'eq', 'AWS_ACCESS_KEY_ID') | map(attribute='value') | first | default('') }}"
        bws_aws_secret_access_key: "{{ bws_secrets | selectattr('key', 'eq', 'AWS_SECRET_ACCESS_KEY') | map(attribute='value') | first | default('') }}"
        bws_aws_s3_bucket_name: "{{ bws_secrets | selectattr('key', 'eq', 'AWS_S3_BUCKET_NAME') | map(attribute='value') | first | default('neuromancers-backups') }}"
        bws_aws_endpoint_url_s3: "{{ bws_secrets | selectattr('key', 'eq', 'AWS_ENDPOINT_URL_S3') | map(attribute='value') | first | default('') }}"
        bws_retention_days: "{{ bws_secrets | selectattr('key', 'eq', 'RETENTION_DAYS') | map(attribute='value') | first | default('30') }}"
      when: bws_secrets | default([]) | length > 0

    - name: Set Postgres and AWS env vars in Coolify
      ansible.builtin.include_tasks: tasks/set_coolify_env.yml
      loop:
        - { key: "POSTGRES_DB", value: "{{ bws_postgres_db }}" }
        - { key: "POSTGRES_HOST", value: "postgres" }
        - { key: "POSTGRES_PASSWORD", value: "{{ bws_postgres_password }}" }
        - { key: "POSTGRES_PORT", value: "5432" }
        - { key: "POSTGRES_USER", value: "{{ bws_postgres_user }}" }
        - { key: "AWS_ACCESS_KEY_ID", value: "{{ bws_aws_access_key_id }}" }
        - {
            key: "AWS_SECRET_ACCESS_KEY",
            value: "{{ bws_aws_secret_access_key }}",
          }
        - { key: "AWS_S3_BUCKET_NAME", value: "{{ bws_aws_s3_bucket_name }}" }
        - { key: "AWS_ENDPOINT_URL_S3", value: "{{ bws_aws_endpoint_url_s3 }}" }
        - { key: "RETENTION_DAYS", value: "{{ bws_retention_days }}" }
      loop_control:
        loop_var: env_item
