---
# =============================================================================
# Neuromancers Network — Ansible Playbook
# =============================================================================
# This playbook provisions a Hetzner Cloud VPS for the full application stack:
#   Django + Gunicorn + PostgreSQL + Redis + Celery (worker + beat) + Flower +
#   Traefik reverse proxy + monitoring (Gatus, Prometheus, Beszel, CrowdSec).
#
# DEPLOYMENT MODEL
# ----------------
#   - Ansible owns host mutation (packages, firewall, Tailscale, CrowdSec).
#   - Docker Compose owns the application lifecycle — the playbook runs
#     `community.docker.docker_compose_v2` against
#     docker-compose.production.yml (in the repo root) after syncing
#     the repo to the server at {{ app_deploy_dir }}.
#   - Coolify is installed on the host (by bootstrap.sh) for optional
#     UI-based management but is NOT required for the stack to function.
#   - Traefik terminates TLS via Let's Encrypt and reverse-proxies to
#     Gunicorn (port 5000).  On staging, a self-signed TLS error is
#     expected since LE cannot validate .ts.net domains.
#   - Runtime secrets are injected into Django containers via the BWS
#     entrypoint re-exec pattern (compose/production/django/entrypoint).
#
# ARCHITECTURE
# ------------
#   Internet → Hetzner VPS (UFW: ports 22, 80, 443, 5555, 8000, 8080, 9090)
#     ├── Traefik (port 80 → 443 redirect, port 443 TLS, port 5555 for Flower)
#     │     ├── https://<domain>/api/health → Django health check
#     │     ├── https://<domain>/admin      → Django admin
#     │     └── https://<domain>:5555        → Flower (basic auth)
#     ├── Gatus (port 8080) — health dashboard + Discord alerts
#     ├── Prometheus (port 9090) + node-exporter
#     ├── Beszel Hub (port 8090) — lightweight host monitoring
#     ├── Coolify (port 8000) — optional UI management, Tailscale-only
#     ├── CrowdSec + Fail2Ban — intrusion detection
#     └── Internal Docker network (unexposed):
#           django:5000, postgres:5432, redis:6379, celeryworker, celerybeat
#
# ENVIRONMENTS
# ------------
#   production (main branch):
#     - Domain: neuromancers.org.uk → Hetzner VPS IP (A record required)
#     - TLS: Let's Encrypt via Traefik (HTTP-01 challenge on port 80)
#     - app_domain set via -e flag from CI workflow
#   staging (staging branch):
#     - No public domain; server identified via Tailscale MagicDNS
#     - app_domain auto-detected from `tailscale status --json .Self.DNSName`
#     - TLS: Let's Encrypt will fail (.ts.net not publicly resolvable)
#     - Access app via tailscale0 IP or Tailscale SSH tunnel
#
# SECRETS
# -------
# All secrets are stored in Bitwarden Secrets Manager.  The GitHub
# Actions workflow (infra/../deploy.yml) runs under `bws run --`,
# injecting every required secret as an environment variable.
# Application containers resolve their own runtime secrets at startup
# via the BWS CLI bundled in the production Docker image; the entrypoint
# re-execs under `bws run --` to populate POSTGRES_*, REDIS_URL,
# DJANGO_SECRET_KEY, etc. before launching the process.
#
# REQUIRED BITWARDEN SECRETS
# ---------------------------
# Infrastructure (SSH / Tailscale / Coolify / monitoring):
#   HETZNER_SSH_HOST      Hetzner VPS IPv4 address
#   HETZNER_SSH_USER      Deploy user (default: deploy)
#   HETZNER_SSH_PRIVATE_KEY  SSH private key (PEM)
#   HETZNER_SSH_PUBLIC_KEY   SSH public key (for bootstrap.sh)
#   TAILSCALE_AUTH_KEY    Pre-auth key for Tailscale
#   TAILSCALE_TAG         Tailscale ACL tag (e.g. tag:neuromancers-staging)
#   TS_OAUTH_CLIENT_ID    Tailscale OAuth client ID (for CI runner)
#   TS_OAUTH_CLIENT_SECRET  Tailscale OAuth client secret
#   COOLIFY_ADMIN_USERNAME  Coolify admin username
#   COOLIFY_ADMIN_EMAIL     Coolify admin email
#   COOLIFY_ADMIN_PASSWORD  Coolify admin password
#   AWS_ENDPOINT_URL_S3   S3-compatible endpoint for backups
#   AWS_S3_BUCKET_NAME    Backup bucket name
#   AWS_ACCESS_KEY_ID     S3 access key
#   AWS_SECRET_ACCESS_KEY S3 secret key
#   RETENTION_DAYS        Backup retention (default: 30)
#   GATUS_DISCORD_WEBHOOK_URL  Discord webhook for health alerts
#
# Application runtime (injected into containers at startup):
#   POSTGRES_DB, POSTGRES_USER, POSTGRES_PASSWORD
#   POSTGRES_HOST, POSTGRES_PORT
#   REDIS_URL
#   DJANGO_SECRET_KEY       Generate: python -c "from django.core.management.utils
#                             import get_random_secret_key; print(get_random_secret_key())"
#   DJANGO_ALLOWED_HOSTS    Comma-separated: .neuromancers.org.uk for production,
#                             MagicDNS hostname (.ts.net) for staging
#   DJANGO_SETTINGS_MODULE  e.g. config.settings.production
#   DJANGO_ADMIN_URL        e.g. admin/ (keep secret to obscure admin login)
#   DJANGO_ACCOUNT_ALLOW_REGISTRATION  true/false
#   CELERY_FLOWER_USER      Basic-auth user for Flower dashboard
#   CELERY_FLOWER_PASSWORD  Basic-auth password for Flower dashboard
#   WEB_CONCURRENCY         Gunicorn worker count (default: 3-5 per CPU)
#
# SETUP STEPS (full walkthrough)
# -------------------------------
#
#  1. Provision the Hetzner VPS
#       Cloud Console → Create Server → Ubuntu 24.04 LTS, any plan.
#       Note the IPv4 address — this is your HETZNER_SSH_HOST.
#
#  2. Run the bootstrap script on the fresh VPS
#       SSH in as root, then:
#         curl -fsSL https://raw.githubusercontent.com/neuromancers/neuromancers_network/\
#         main/infra/scripts/bootstrap.sh | bash
#       This creates the deploy user, hardens SSH, installs Docker, and
#       sets up the Coolify directory structure.
#
#  3. Set up Tailscale
#       Log out and SSH back as the deploy user to verify key access.
#       In the Tailscale admin console:
#         - Generate a reusable pre-auth key → save as TAILSCALE_AUTH_KEY
#         - Create or reuse an OAuth client → save TS_OAUTH_CLIENT_ID/TS_OAUTH_CLIENT_SECRET
#         - Create an ACL tag (e.g. tag:neuromancers-staging) → save as TAILSCALE_TAG
#       Tailscale with MagicDNS must be enabled in the tailnet settings
#       for staging hostname detection to work.
#
#  4. Set up Bitwarden Secrets Manager
#       - Create a new project (e.g. "Neuromancers Platform")
#       - Create all secrets listed under "Required Bitwarden Secrets" above
#         with the exact KEY names matching your Bitwarden identifiers.
#       - Generate a machine-to-machine access token for the project
#         → this is your BWS_ACCESS_TOKEN.
#
#  5. Configure GitHub Environments
#       Settings → Environments → Create two environments:
#
#       production:
#         Required reviewers: (optional)
#         Deployment branches: main
#         Secrets:
#           BWS_ACCESS_TOKEN  <from step 4>
#
#       staging:
#         Deployment branches: staging
#         Secrets:
#           BWS_ACCESS_TOKEN  <same or separate Bitwarden token>
#
#  6. DNS setup
#       Production: Create an A record neuromancers.org.uk → HETZNER_SSH_HOST
#       Staging: No DNS needed — the playbook auto-detects the Tailscale
#         MagicDNS hostname and sets app_domain dynamically.
#
#  7. Prepare Django env files (one-time, local)
#       The docker-compose.production.yml references .envs/.production/.django
#       and .envs/.production/.postgres.  These are gitignored; create them:
#
#         mkdir -p .envs/.production
#         cat > .envs/.production/.django <<-'EOF'
#         DJANGO_ALLOWED_HOSTS=.example.com
#         DJANGO_SETTINGS_MODULE=config.settings.production
#         DJANGO_SECRET_KEY=...
#         DJANGO_ADMIN_URL=admin/
#         DJANGO_ACCOUNT_ALLOW_REGISTRATION=False
#         REDIS_URL=redis://redis:6379/0
#         CELERY_FLOWER_USER=admin
#         CELERY_FLOWER_PASSWORD=...
#         WEB_CONCURRENCY=4
#         EOF
#         cat > .envs/.production/.postgres <<-'EOF'
#         POSTGRES_DB=neuromancers
#         POSTGRES_USER=neuromancers
#         POSTGRES_PASSWORD=...
#         POSTGRES_HOST=postgres
#         POSTGRES_PORT=5432
#         EOF
#       These values ARE in Bitwarden; the local copies are only needed for
#       local development or if running the playbook outside CI.  In CI,
#       bws run injects them.
#
#  8. First deploy
#       Push to main (production) or staging:
#         git checkout staging
#         git push origin staging
#       This triggers CI (build + test) then the Deploy Infrastructure
#       workflow, which runs this playbook under `bws run --`.
#
#       The playbook will:
#         a) Apt-install system packages (curl, ufw, fail2ban, etc.)
#         b) Install Docker + Docker Compose
#         c) Install & connect Tailscale
#         d) Detect MagicDNS hostname (staging) or use -e override (prod)
#         e) Configure UFW firewall (ports 22, 80, 443, 5555, 8000, 8080, 9090)
#         f) Install CrowdSec + Fail2Ban
#         g) rsync the repo to /opt/neuromancers/app
#         h) Deploy Docker Compose stack (postgres, redis, django, celery*,
#            flower, traefik)
#         i) Wait for health endpoint via docker compose exec (retry 30×5s)
#         j) Deploy monitoring containers (Gatus, Prometheus, node-exporter,
#            Beszel hub/agent) if not already running
#
# POST-DEPLOY — Access & Management
# -----------------------------------
#
#   Django admin:
#     Production: https://neuromancers.org.uk/<DJANGO_ADMIN_URL>/
#     Staging:    via Tailscale — resolve the MagicDNS hostname in your
#                 tailnet and add it to DJANGO_ALLOWED_HOSTS in Bitwarden
#     Create a superuser:
#       docker compose -p neuromancers exec django \
#         python manage.py createsuperuser
#
#   Health check:
#     curl -s https://neuromancers.org.uk/api/health
#     Expected: {"status":"ok","database":"ok","redis":"ok"}
#
#   Flower (Celery task monitoring):
#     https://neuromancers.org.uk:5555/
#     Basic-auth: CELERY_FLOWER_USER / CELERY_FLOWER_PASSWORD
#
#   Gatus health dashboard:
#     http://<server-ip>:8080/
#     (or http://localhost:8080/ if on the host)
#
#   Prometheus:
#     http://<server-ip>:9090/
#
#   Beszel Hub:
#     http://<server-ip>:8090/
#
#   Coolify dashboard (Tailscale-only):
#     http://<tailscale-ip>:8000/
#
# MANAGEMENT COMMANDS
# --------------------
#   Run any Django management command via docker compose exec:
#     docker compose -p neuromancers exec django python manage.py <command>
#
#   Common commands:
#     createsuperuser              Create initial admin user
#     makemigrations               (dev only; prod uses pre-built image)
#     migrate                      Apply pending migrations (runs auto on start)
#     collectstatic                (runs auto on start)
#     shell_plus                   Django extensions shell (if installed)
#     dbshell                      Raw psql into Postgres
#     clearsessions                Clean expired sessions (scheduled cron)
#
#   Postgres backup / restore:
#     The awscli container handles S3 backups automatically.  Manual:
#       docker compose -p neuromancers exec postgres \
#         /usr/local/bin/maintenance/backup
#     Restore from latest backup:
#       docker compose -p neuromancers exec postgres \
#         /usr/local/bin/maintenance/restore <backup-file>
#
#   Tailscale status / debug:
#     tailscale status --json | jq .  # Show MagicDNS name, connected peers
#     tailscale ping <peer>            # Verify tailnet connectivity
#
# MONITORING
# ----------
#   - Gatus checks the Django /api/health endpoint every 30s, sends
#     Discord alert on failure.
#   - CrowdSec watches Traefik logs; blocks offending IPs via iptables.
#   - Fail2Ban monitors SSH auth logs.
#   - Prometheus + node-exporter collect system metrics.
#   - Beszel Hub shows CPU, RAM, disk, and network graphs.
#   - Postgres backups run daily at 02:00 UTC via systemd timer.
#   - Django session cleanup runs every 90 days.
#
# TROUBLESHOOTING
# ---------------
#   Playbook fails on "No first item, sequence was empty" at coolify_* tasks:
#     Coolify server list is empty (first deploy or fresh install).
#     The playbook handles this gracefully — the fix uses
#     selectattr('name') | first | default({}) to guard against empty lists.
#     It also POST-creates a localhost server entry when the list is empty.
#
#   Health check fails (docker compose exec timeout):
#     Check if Postgres is reachable: docker compose -p neuromancers logs postgres
#     If Postgres is healthy, check Django logs: docker compose -p neuromancers logs django
#     Common cause: missing DJANGO_ALLOWED_HOSTS or wrong DATABASE_URL.
#     Verify Bitwarden secrets are correct.
#
#   Gatus shows unhealthy on staging:
#     Expected — Traefik's Host('neuromancers.org.uk') rule won't match the
#     MagicDNS hostname.  Access Gatus directly via http://<server-ip>:8080/.
#
#   Traefik fails to get Let's Encrypt certificate:
#     Verify DNS A record points to the correct Hetzner VPS IP.
#     On staging this is expected (.ts.net domains are not publicly resolvable).
#
#   Cannot SSH after playbook:
#     UFW blocks port 22 from non-tailnet IPs by default.  Verify your SSH
#     client's IP is allowed, or connect via Tailscale SSH.
# =============================================================================

# Preliminary play: configure passwordless sudo if missing
#
# The deploy user is created with --disabled-password and added to the
# docker group by bootstrap.sh.  While it has no sudo password, it *can*
# run docker without privileges, so we use a throwaway alpine container to
# write the NOPASSWD sudoers drop-in when it is absent.
#
# Once this play succeeds, the main play below can safely use become: true.
- name: Bootstrap passwordless sudo
  hosts: all
  gather_facts: false
  become: false
  tasks:
    - name: Check whether passwordless sudo is already active
      ansible.builtin.raw: sudo -n true 2>/dev/null
      register: sudo_check
      changed_when: false
      ignore_errors: true

    - name: Write NOPASSWD sudoers drop-in via Docker
      ansible.builtin.raw: |
        docker run --rm -v /:/host alpine sh -c '
          echo "{{ ansible_user }} ALL=(ALL) NOPASSWD:ALL" > /host/etc/sudoers.d/99-{{ ansible_user }}
        '
      when: sudo_check.rc != 0

    - name: Verify passwordless sudo now works
      ansible.builtin.raw: sudo -n true 2>/dev/null
      changed_when: false
      when: sudo_check.rc != 0

# Main play
- name: Host bootstrap and services
  hosts: all
  become: true
  collections:
    - community.general
    - community.docker
    - arillso.agent
    - arillso.system
    - ansible.posix

  vars:
    coolify_port: 8000
    gatus_port: 8080
    beszel_hub_port: 8090
    prometheus_port: 9090
    app_healthcheck_url: "http://django:5000/api/health"
    coolify_healthcheck_url: "http://localhost:8000/api/v1/health"
    app_deploy_dir: /opt/neuromancers/app
    compose_project_name: neuromancers

  tasks:
    # ---------------------------------------------------------------------
    # BASE PACKAGES
    # ---------------------------------------------------------------------
    - name: Update apt cache
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600

    - name: Install base packages
      ansible.builtin.apt:
        name:
          - curl
          - ca-certificates
          - gnupg
          - lsb-release
          - ufw
          - unattended-upgrades
          - fail2ban
          - cron
          - python3-pip
          - jq
          - unzip
        state: present

    - name: Install Bitwarden Secrets Manager CLI on target host
      ansible.builtin.shell: |
        set -euo pipefail
        latest_tag="$(curl -s https://api.github.com/repos/bitwarden/sdk-sm/releases/latest | jq -r '.tag_name')"
        version="${latest_tag#*-v}"
        asset_name="bws-x86_64-unknown-linux-gnu-${version}.zip"
        download_url="https://github.com/bitwarden/sdk-sm/releases/download/bws-v${version}/${asset_name}"
        tmp_dir="$(mktemp -d)"
        trap 'rm -rf "${tmp_dir}"' EXIT
        curl -L -o "${tmp_dir}/bws.zip" "${download_url}"
        unzip -q -o "${tmp_dir}/bws.zip" -d "${tmp_dir}"
        install -m 0755 "${tmp_dir}/bws" /usr/local/bin/bws
      args:
        executable: /bin/bash
        creates: /usr/local/bin/bws

    - name: Download AWS CLI installer
      get_url:
        url: "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip"
        dest: "/tmp/awscliv2.zip"

    - name: Unzip AWS CLI installer
      unarchive:
        src: "/tmp/awscliv2.zip"
        dest: "/tmp"
        remote_src: yes

    - name: Run AWS CLI installer
      command: "/tmp/aws/install"
      args:
        creates: /usr/local/bin/aws

    - name: Verify AWS CLI installation
      command: "aws --version"
      register: aws_cli_version
      changed_when: false

    - name: Display AWS CLI version
      debug:
        msg: "{{ aws_cli_version.stdout }}"

    - name: Install Docker SDK for Python via apt
      ansible.builtin.apt:
        name: python3-docker
        state: present

    # ---------------------------------------------------------------------
    # TAILSCALE INSTALL AND JOIN
    # ---------------------------------------------------------------------
    - name: Install Tailscale package
      ansible.builtin.shell: |
        curl -fsSL https://tailscale.com/install.sh | sh
      args:
        creates: /usr/bin/tailscale

    - name: Ensure tailscaled service is enabled and running
      ansible.builtin.systemd:
        name: tailscaled
        state: started
        enabled: true

    - name: Check current Tailscale state
      ansible.builtin.command: tailscale status --json
      register: tailscale_status
      changed_when: false
      failed_when: false

    - name: Join tailnet if not already connected
      ansible.builtin.command: >-
        tailscale up
        --authkey={{ lookup('ansible.builtin.env', 'TAILSCALE_AUTH_KEY', default=undef()) }}
        --accept-routes=false
        --advertise-tags={{ lookup('ansible.builtin.env', 'TAILSCALE_TAG', default=undef()) }}
        --ssh
      when: tailscale_status.rc != 0

    - name: Detect Tailscale MagicDNS hostname for app_domain
      ansible.builtin.command: tailscale status --json
      register: ts_magicdns
      changed_when: false
      failed_when: false
      when: app_domain is not defined

    - name: Set app_domain from MagicDNS when not explicitly provided
      ansible.builtin.set_fact:
        app_domain: "{{ (ts_magicdns.stdout | from_json).Self.DNSName | trim('.') }}"
      when:
        - app_domain is not defined
        - ts_magicdns.rc == 0
        - ts_magicdns.stdout | default('') | length > 0

    - name: Fallback app_domain to ansible_host when MagicDNS unavailable
      ansible.builtin.set_fact:
        app_domain: "{{ ansible_host }}"
      when:
        - app_domain is not defined
        - ansible_host is defined

    # ---------------------------------------------------------------------
    # FIREWALL POLICY
    # ---------------------------------------------------------------------
    - name: UFW default deny incoming
      community.general.ufw:
        default: deny
        direction: incoming

    - name: UFW default allow outgoing
      community.general.ufw:
        default: allow
        direction: outgoing

    - name: Allow public application ports only
      community.general.ufw:
        rule: allow
        port: "{{ item }}"
        proto: tcp
      loop:
        - "80"
        - "443"

    - name: Allow SSH and management ports over Tailscale only
      community.general.ufw:
        rule: allow
        interface: tailscale0
        direction: in
        port: "{{ item }}"
        proto: tcp
      loop:
        - "22"
        - "{{ coolify_port }}"
        - "{{ gatus_port }}"
        - "{{ beszel_hub_port }}"
        - "{{ prometheus_port }}"

    - name: Enable UFW
      community.general.ufw:
        state: enabled
      notify: reload ufw

    # ---------------------------------------------------------------------
    # COOLIFY INSTALL
    # ---------------------------------------------------------------------
    - name: Check whether Coolify is already installed
      ansible.builtin.stat:
        path: /data/coolify/source/.env
      register: coolify_env

    - name: Install Coolify if missing
      ansible.builtin.shell: |
        curl -fsSL https://cdn.coollabs.io/coolify/install.sh | bash
      environment:
        ROOT_USERNAME: "{{ lookup('ansible.builtin.env', 'COOLIFY_ADMIN_USERNAME', default=undef()) }}"
        ROOT_USER_EMAIL: "{{ lookup('ansible.builtin.env', 'COOLIFY_ADMIN_EMAIL', default=undef()) }}"
        ROOT_USER_PASSWORD: "{{ lookup('ansible.builtin.env', 'COOLIFY_ADMIN_PASSWORD', default=undef()) }}"
      when: not coolify_env.stat.exists

    - name: Ensure deploy SSH user is in docker group
      ansible.builtin.user:
        name: "{{ lookup('ansible.builtin.env', 'HETZNER_SSH_USER', default=undef()) }}"
        groups: docker
        append: true

    - name: Wait for Coolify health endpoint
      ansible.builtin.uri:
        url: "{{ coolify_healthcheck_url }}"
        status_code: 200
      register: coolify_health
      retries: 30
      delay: 10
      until: coolify_health.status == 200

    - name: Ensure Coolify SSH keys directory exists
      ansible.builtin.file:
        path: /data/coolify/ssh/keys
        state: directory
        mode: "0755"

    - name: Generate Coolify SSH key pair for localhost connection
      ansible.builtin.command:
        cmd: ssh-keygen -t ed25519 -a 100 -f /data/coolify/ssh/keys/id.root@host.docker.internal -q -N "" -C root@coolify
        creates: /data/coolify/ssh/keys/id.root@host.docker.internal

    - name: Set ownership of Coolify SSH key pair
      ansible.builtin.file:
        path: "{{ item }}"
        owner: "9999"
        group: "9999"
        mode: "0600"
      loop:
        - /data/coolify/ssh/keys/id.root@host.docker.internal
        - /data/coolify/ssh/keys/id.root@host.docker.internal.pub

    - name: Ensure root .ssh directory exists
      ansible.builtin.file:
        path: /root/.ssh
        state: directory
        mode: "0700"

    - name: Authorize Coolify SSH public key for root login
      ansible.builtin.shell: |
        if ! grep -qFf /data/coolify/ssh/keys/id.root@host.docker.internal.pub /root/.ssh/authorized_keys 2>/dev/null; then
          cat /data/coolify/ssh/keys/id.root@host.docker.internal.pub >> /root/.ssh/authorized_keys
          chmod 600 /root/.ssh/authorized_keys
        fi

    - name: Read Coolify localhost SSH private key
      ansible.builtin.slurp:
        src: /data/coolify/ssh/keys/id.root@host.docker.internal
      register: coolify_ssh_key

    - name: Check if Coolify API is enabled
      ansible.builtin.uri:
        url: http://localhost:{{ coolify_port }}/api/v1/health
        method: GET
      register: coolify_health

    - name: Set Coolify API token
      ansible.builtin.set_fact:
        coolify_api_token: "{{ lookup('ansible.builtin.env', 'COOLIFY_ADMIN_TOKEN', default=undef()) }}"
      when: coolify_health.status == 200

    - name: Fetch existing Coolify keys
      ansible.builtin.uri:
        url: "http://localhost:{{ coolify_port }}/api/v1/security/keys"
        method: GET
        headers:
          Authorization: "Bearer {{ coolify_api_token }}"
        status_code: 200
        return_content: true
      register: coolify_keys
      when: coolify_api_token is defined

    - name: Register localhost SSH key with Coolify API if missing
      ansible.builtin.uri:
        url: "http://localhost:{{ coolify_port }}/api/v1/security/keys"
        method: POST
        headers:
          Authorization: "Bearer {{ coolify_api_token }}"
        body_format: json
        body:
          name: "root@host.docker.internal"
          description: "Coolify localhost SSH key"
          private_key: "{{ coolify_ssh_key.content | b64decode }}"
        status_code: 201
        return_content: true
      register: coolify_key_created
      when: coolify_keys.json | selectattr('name', 'equalto', 'root@host.docker.internal') | list | length == 0

    - name: Resolve localhost key UUID from created key
      ansible.builtin.set_fact:
        coolify_key_uuid: "{{ coolify_key_created.json.uuid }}"
      when: coolify_key_created is defined and coolify_key_created.json.uuid is defined

    - name: Resolve localhost key UUID from existing keys
      ansible.builtin.set_fact:
        coolify_key_uuid: "{{ (coolify_keys.json | selectattr('name', 'equalto', 'root@host.docker.internal') | first).uuid }}"
      when:
        - coolify_key_uuid is not defined
        - coolify_keys is defined
        - coolify_keys.json | selectattr('name', 'equalto', 'root@host.docker.internal') | list | length > 0

    - name: Fetch Coolify servers
      ansible.builtin.uri:
        url: "http://localhost:{{ coolify_port }}/api/v1/servers"
        method: GET
        headers:
          Authorization: "Bearer {{ coolify_api_token }}"
        status_code: 200
        return_content: true
      register: coolify_servers
      when: coolify_key_uuid is defined

    - name: Get Docker bridge gateway IP for container-to-host connectivity
      ansible.builtin.shell: |
        docker network inspect bridge | jq -r '.[0].IPAM.Config[0].Gateway'
      register: docker_gateway
      changed_when: false
      failed_when: false

    - name: Find localhost server UUID by name
      ansible.builtin.set_fact:
        coolify_server_uuid: "{{ (coolify_servers.json | selectattr('name', 'equalto', 'localhost') | first | default({})).uuid | default('') }}"
      when: coolify_servers is defined and coolify_servers.status == 200

    - name: Get Tailscale IPv4
      shell: tailscale ip -4
      register: ts_ip
      changed_when: false
      failed_when: false
      when: tailscale_status.rc == 0

    - name: Set coolify_server_ip to Tailscale IP or fallback
      set_fact:
        coolify_server_ip: "{{ ts_ip.stdout | default(ansible_default_ipv4.address, true) }}"

    - name: Create localhost server in Coolify if missing
      ansible.builtin.uri:
        url: "http://localhost:{{ coolify_port }}/api/v1/servers"
        method: POST
        headers:
          Authorization: "Bearer {{ coolify_api_token }}"
        body_format: json
        body:
          name: "localhost"
          description: "This is the server where Coolify is running on. Don't delete this!"
          ip: "{{ coolify_server_ip }}"
          port: 22
          user: "root"
          private_key_uuid: "{{ coolify_key_uuid }}"
        status_code: 201
        return_content: true
      register: coolify_server_created
      when: coolify_key_uuid is defined and (coolify_server_uuid | default('')) | length == 0

    - name: Set server UUID from created server
      ansible.builtin.set_fact:
        coolify_server_uuid: "{{ coolify_server_created.json.uuid }}"
      when: coolify_server_created is defined and coolify_server_created.json.uuid is defined

    - name: Assign localhost SSH key and correct IP to existing localhost server
      ansible.builtin.uri:
        url: "http://localhost:{{ coolify_port }}/api/v1/servers/{{ coolify_server_uuid }}"
        method: PATCH
        headers:
          Authorization: "Bearer {{ coolify_api_token }}"
        body_format: json
        body:
          private_key_uuid: "{{ coolify_key_uuid }}"
          ip: "{{ docker_gateway.stdout | default('host.docker.internal', true) }}"
        status_code: 201
        return_content: true
      register: coolify_server_updated
      when: (coolify_server_uuid | default('')) | length > 0 and coolify_server_created is not defined

    - name: Validate localhost server
      ansible.builtin.uri:
        url: "http://localhost:{{ coolify_port }}/api/v1/servers/{{ coolify_server_uuid }}/validate"
        method: GET
        headers:
          Authorization: "Bearer {{ coolify_api_token }}"
        status_code: 201
        return_content: true
      register: coolify_server_validation
      when: (coolify_server_uuid | default('')) | length > 0

    - name: Ensure Docker service is enabled and running
      ansible.builtin.systemd:
        name: docker
        state: started
        enabled: true

    - name: Ensure Docker Compose plugin is installed
      ansible.builtin.apt:
        name: docker-compose-plugin
        state: present

    # ---------------------------------------------------------------------
    # APPLICATION STACK (Django + Postgres + Redis + Celery + Traefik)
    # ---------------------------------------------------------------------

    - name: Create runtime directory for application stack
      ansible.builtin.file:
        path: "{{ app_deploy_dir }}"
        state: directory
        mode: "0755"

    - name: Create Docker volumes for application data
      community.docker.docker_volume:
        name: "{{ item }}"
        state: present
      loop:
        - production_postgres_data
        - production_postgres_data_backups
        - production_traefik
        - production_redis_data

    - name: Sync project source to server (excludes venv, node_modules, git)
      ansible.posix.synchronize:
        src: "{{ playbook_dir }}/../../"
        dest: "{{ app_deploy_dir }}/"
        rsync_opts:
          - "--exclude=.venv/"
          - "--exclude=node_modules/"
          - "--exclude=.git/"
          - "--exclude=.ruff_cache/"
          - "--exclude=__pycache__/"
          - "--exclude=*.pyc"
          - "--exclude=*.pyo"
          - "--exclude=.DS_Store"
        delete: true

    - name: Deploy application stack via Docker Compose
      community.docker.docker_compose_v2:
        project_src: "{{ app_deploy_dir }}"
        files:
          - docker-compose.production.yml
        project_name: "{{ compose_project_name }}"
        state: present
        recreate: auto

    - name: Wait for application health endpoint
      ansible.builtin.shell:
        cmd: |
          set -euo pipefail
          for i in $(seq 1 30); do
            if docker compose -p {{ compose_project_name }} exec -T django python -c "
          import urllib.request, json
          resp = urllib.request.urlopen('http://localhost:5000/api/health', timeout=5)
          data = json.loads(resp.read())
          assert data['status'] == 'ok'
          " 2>/dev/null; then
              echo 'Health check passed'
              exit 0
            fi
            sleep 5
          done
          echo 'Health check failed after 30 attempts' >&2
          exit 1
        chdir: "{{ app_deploy_dir }}"
      changed_when: false

    # ---------------------------------------------------------------------
    # RETAINED MONITORING AND SECURITY SERVICES (DEPLOY NOW)
    # ---------------------------------------------------------------------
    - name: Ensure CrowdSec apt repository script is present
      ansible.builtin.get_url:
        url: https://packagecloud.io/install/repositories/crowdsec/crowdsec/script.deb.sh
        dest: /tmp/crowdsec-install.sh
        mode: "0755"

    - name: Configure CrowdSec apt repository
      ansible.builtin.command: bash /tmp/crowdsec-install.sh
      args:
        creates: /etc/apt/sources.list.d/crowdsec_crowdsec.list

    - name: Install CrowdSec and firewall bouncer
      ansible.builtin.apt:
        name:
          - crowdsec
          - crowdsec-firewall-bouncer-iptables
        state: present
        update_cache: true

    - name: Deploy CrowdSec acquisition config
      ansible.builtin.copy:
        src: ../security/crowdsec-config.yml
        dest: /etc/crowdsec/acquis.yaml
        mode: "0644"
      notify: restart crowdsec

    - name: Install CrowdSec collections
      ansible.builtin.command: cscli collections install crowdsecurity/linux crowdsecurity/traefik
      register: crowdsec_collections
      changed_when: "'already installed' not in (crowdsec_collections.stderr | default(''))"

    - name: Ensure CrowdSec is enabled and running
      ansible.builtin.systemd:
        name: crowdsec
        state: started
        enabled: true

    - name: Deploy Fail2Ban jail config
      ansible.builtin.copy:
        src: ../security/fail2ban-jail.local
        dest: /etc/fail2ban/jail.local
        mode: "0644"
      notify: restart fail2ban

    - name: Ensure Fail2Ban is enabled and running
      ansible.builtin.systemd:
        name: fail2ban
        state: started
        enabled: true

    - name: Create runtime directories for monitoring and backups
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        mode: "0755"
      loop:
        - /opt/gatus
        - /opt/prometheus
        - /opt/scripts
        - /opt/backups
        - /opt/beszel

    - name: Deploy Gatus config (fixed source path)
      ansible.builtin.copy:
        src: ../monitoring/gatus-config.yml
        dest: /opt/gatus/config.yml
        mode: "0644"

    - name: Deploy Gatus container
      community.docker.docker_container:
        name: gatus
        image: twinproduction/gatus:latest
        state: started
        restart_policy: unless-stopped
        recreate: false
        network_mode: host
        volumes:
          - /opt/gatus/config.yml:/config/config.yaml:ro
        env:
          APP_HEALTHCHECK_URL: "http://localhost/api/health"
          GATUS_APP_HOST_HEADER: "{{ app_domain }}"
          GATUS_DISCORD_WEBHOOK_URL: "{{ lookup('ansible.builtin.env', 'GATUS_DISCORD_WEBHOOK_URL', default=undef()) }}"
          COOLIFY_HEALTHCHECK_URL: "{{ coolify_healthcheck_url }}"

    - name: Deploy Prometheus config
      ansible.builtin.copy:
        src: ../monitoring/prometheus.yml
        dest: /opt/prometheus/prometheus.yml
        mode: "0644"

    - name: Deploy Prometheus container
      community.docker.docker_container:
        name: prometheus
        image: prom/prometheus:latest
        state: started
        restart_policy: unless-stopped
        recreate: false
        network_mode: host
        volumes:
          - /opt/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
        command: ["--config.file=/etc/prometheus/prometheus.yml"]

    - name: Deploy node exporter container
      community.docker.docker_container:
        name: node-exporter
        image: quay.io/prometheus/node-exporter:latest
        state: started
        restart_policy: unless-stopped
        recreate: false
        network_mode: host
        pid_mode: host
        command:
          - --path.rootfs=/host
        volumes:
          - /:/host:ro,rslave

    - name: Deploy Beszel Hub container
      community.docker.docker_container:
        name: beszel-hub
        image: henrygd/beszel:latest
        state: started
        restart_policy: unless-stopped
        recreate: false
        ports:
          - "{{ beszel_hub_port }}:8090"

    - name: Deploy Beszel Agent container
      community.docker.docker_container:
        name: beszel-agent
        image: henrygd/beszel-agent:latest
        state: started
        restart_policy: unless-stopped
        recreate: false
        network_mode: host
        pid_mode: host
        privileged: true
        volumes:
          - /var/run/docker.sock:/var/run/docker.sock:ro

    - name: Install backup script
      ansible.builtin.copy:
        src: ../scripts/backup.sh
        dest: /opt/scripts/backup.sh
        mode: "0750"

    - name: Install backup wrapper script
      ansible.builtin.copy:
        src: ../scripts/run-backup.sh
        dest: /opt/scripts/run-backup.sh
        mode: "0750"

    - name: Install Django session cleanup script
      ansible.builtin.copy:
        src: ../scripts/clear-django-sessions.sh
        dest: /opt/scripts/clear-django-sessions.sh
        mode: "0750"

    - name: Create backup BWS access token file
      ansible.builtin.copy:
        dest: /opt/backups/.bws_token
        content: "{{ bws_access_token | default(lookup('ansible.builtin.env', 'BWS_ACCESS_TOKEN', default='')) }}\n"
        owner: root
        group: root
        mode: 0600


    - name: Configure daily backup cron
      ansible.builtin.cron:
        name: neuromancers-daily-backup
        user: root
        minute: "0"
        hour: "2"
        job: "/opt/scripts/run-backup.sh"

    - name: Configure Django session cleanup cron
      ansible.builtin.cron:
        name: neuromancers-django-clearsessions
        user: root
        minute: "15"
        hour: "2"
        job: "/opt/scripts/clear-django-sessions.sh"

    # ---------------------------------------------------------------------
    # VALIDATION
    # ---------------------------------------------------------------------
    - name: Validate Coolify health
      ansible.builtin.uri:
        url: "{{ coolify_healthcheck_url }}"
        status_code: 200

    - name: Validate required services are running
      ansible.builtin.service_facts:

    - name: Assert key services are active
      ansible.builtin.assert:
        that:
          - ansible_facts.services['tailscaled.service'].state == 'running'
          - ansible_facts.services['fail2ban.service'].state == 'running'
          - ansible_facts.services['crowdsec.service'].state == 'running'
        fail_msg: "One or more required services are not running (tailscaled, fail2ban, crowdsec)."

    - name: Validate UFW is active
      ansible.builtin.command: ufw status
      register: ufw_status
      changed_when: false

    - name: Assert UFW is active
      ansible.builtin.assert:
        that:
          - "'Status: active' in ufw_status.stdout"
        fail_msg: "UFW is not active."

    - name: Validate retained containers are running
      ansible.builtin.command: docker ps --format '{{ '{{' }}.Names{{ '}}' }}'
      register: running_containers
      changed_when: false

    - name: Assert retained containers are running
      ansible.builtin.assert:
        that:
          - "'gatus' in running_containers.stdout"
          - "'prometheus' in running_containers.stdout"
          - "'node-exporter' in running_containers.stdout"
          - "'beszel-hub' in running_containers.stdout"
          - "'beszel-agent' in running_containers.stdout"
        fail_msg: "One or more retained containers are missing."

    - name: Smoke - public health endpoint returns healthy DB and Redis
      ansible.builtin.shell:
        cmd: |
          docker compose -p {{ compose_project_name }} exec -T django python -c "
            import urllib.request, json
            resp = urllib.request.urlopen('http://localhost:5000/api/health', timeout=10)
            print(resp.read().decode())
          "
        chdir: "{{ app_deploy_dir }}"
      register: public_health
      tags:
        - smoke

    - name: Smoke - assert public health content is healthy
      ansible.builtin.assert:
        that:
          - (public_health.stdout | from_json).status == 'ok'
          - (public_health.stdout | from_json).database == 'ok'
          - (public_health.stdout | from_json).redis == 'ok'
        fail_msg: "Public application health endpoint is not healthy."
      tags:
        - smoke

    - name: Smoke - list running compose services
      ansible.builtin.command:
        cmd: "docker compose -p {{ compose_project_name }} ps --services --filter status=running"
        chdir: "{{ app_deploy_dir }}"
      register: running_services
      changed_when: false
      tags:
        - smoke

    - name: Smoke - assert all application services are running
      ansible.builtin.assert:
        that:
          - "'django' in running_services.stdout_lines"
          - "'postgres' in running_services.stdout_lines"
          - "'redis' in running_services.stdout_lines"
          - "'celeryworker' in running_services.stdout_lines"
          - "'celerybeat' in running_services.stdout_lines"
          - "'traefik' in running_services.stdout_lines"
        fail_msg: "One or more application services are not running."
      tags:
        - smoke

  handlers:
    - name: reload ufw
      community.general.ufw:
        state: reloaded

    - name: restart crowdsec
      ansible.builtin.systemd:
        name: crowdsec
        state: restarted

    - name: restart fail2ban
      ansible.builtin.systemd:
        name: fail2ban
        state: restarted
