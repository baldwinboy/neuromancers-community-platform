---
# Preliminary play: configure passwordless sudo if missing
#
# The deploy user is created with --disabled-password and added to the
# docker group by bootstrap.sh.  While it has no sudo password, it *can*
# run docker without privileges, so we use a throwaway alpine container to
# write the NOPASSWD sudoers drop-in when it is absent.
#
# Once this play succeeds, the main play below can safely use become: true.
- name: Bootstrap passwordless sudo
  hosts: all
  gather_facts: false
  become: false
  tasks:
    - name: Check whether passwordless sudo is already active
      ansible.builtin.raw: sudo -n true 2>/dev/null
      register: sudo_check
      changed_when: false
      ignore_errors: true

    - name: Write NOPASSWD sudoers drop-in via Docker
      ansible.builtin.raw: |
        docker run --rm -v /:/host alpine sh -c '
          echo "{{ ansible_user }} ALL=(ALL) NOPASSWD:ALL" > /host/etc/sudoers.d/99-{{ ansible_user }}
        '
      when: sudo_check.rc != 0

    - name: Verify passwordless sudo now works
      ansible.builtin.raw: sudo -n true 2>/dev/null
      changed_when: false
      when: sudo_check.rc != 0

# Main play
- name: Host bootstrap and services
  hosts: all
  become: true
  collections:
    - community.general
    - community.docker
    - arillso.agent
    - arillso.system

  vars:
    coolify_port: 8000
    gatus_port: 8080
    beszel_hub_port: 8090
    prometheus_port: 9090
    app_healthcheck_url: "http://django:8000/api/health"
    coolify_healthcheck_url: "http://localhost:8000/api/v1/health"

  tasks:
    # ---------------------------------------------------------------------
    # BASE PACKAGES
    # ---------------------------------------------------------------------
    - name: Update apt cache
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600

    - name: Install base packages
      ansible.builtin.apt:
        name:
          - curl
          - ca-certificates
          - gnupg
          - lsb-release
          - ufw
          - unattended-upgrades
          - fail2ban
          - cron
          - python3-pip
          - jq
          - unzip
        state: present

    - name: Install Bitwarden Secrets Manager CLI on target host
      ansible.builtin.shell: |
        set -euo pipefail
        latest_tag="$(curl -s https://api.github.com/repos/bitwarden/sdk-sm/releases/latest | jq -r '.tag_name')"
        version="${latest_tag#*-v}"
        asset_name="bws-x86_64-unknown-linux-gnu-${version}.zip"
        download_url="https://github.com/bitwarden/sdk-sm/releases/download/bws-v${version}/${asset_name}"
        tmp_dir="$(mktemp -d)"
        trap 'rm -rf "${tmp_dir}"' EXIT
        curl -L -o "${tmp_dir}/bws.zip" "${download_url}"
        unzip -q -o "${tmp_dir}/bws.zip" -d "${tmp_dir}"
        install -m 0755 "${tmp_dir}/bws" /usr/local/bin/bws
      args:
        executable: /bin/bash
        creates: /usr/local/bin/bws

    - name: Download AWS CLI installer
      get_url:
        url: "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip"
        dest: "/tmp/awscliv2.zip"

    - name: Unzip AWS CLI installer
      unarchive:
        src: "/tmp/awscliv2.zip"
        dest: "/tmp"
        remote_src: yes

    - name: Run AWS CLI installer
      command: "/tmp/aws/install"
      args:
        creates: /usr/local/bin/aws

    - name: Verify AWS CLI installation
      command: "aws --version"
      register: aws_cli_version
      changed_when: false

    - name: Display AWS CLI version
      debug:
        msg: "{{ aws_cli_version.stdout }}"

    - name: Install Docker SDK for Python via apt
      ansible.builtin.apt:
        name: python3-docker
        state: present

    # ---------------------------------------------------------------------
    # TAILSCALE INSTALL AND JOIN
    # ---------------------------------------------------------------------
    - name: Install Tailscale package
      ansible.builtin.shell: |
        curl -fsSL https://tailscale.com/install.sh | sh
      args:
        creates: /usr/bin/tailscale

    - name: Ensure tailscaled service is enabled and running
      ansible.builtin.systemd:
        name: tailscaled
        state: started
        enabled: true

    - name: Check current Tailscale state
      ansible.builtin.command: tailscale status --json
      register: tailscale_status
      changed_when: false
      failed_when: false

    - name: Join tailnet if not already connected
      ansible.builtin.command: >-
        tailscale up
        --authkey={{ lookup('ansible.builtin.env', 'TAILSCALE_AUTH_KEY', default=undef()) }}
        --accept-routes=false
        --advertise-tags={{ lookup('ansible.builtin.env', 'TAILSCALE_TAG', default=undef()) }}
        --ssh
      when: tailscale_status.rc != 0

    # ---------------------------------------------------------------------
    # FIREWALL POLICY
    # ---------------------------------------------------------------------
    - name: UFW default deny incoming
      community.general.ufw:
        default: deny
        direction: incoming

    - name: UFW default allow outgoing
      community.general.ufw:
        default: allow
        direction: outgoing

    - name: Allow public application ports only
      community.general.ufw:
        rule: allow
        port: "{{ item }}"
        proto: tcp
      loop:
        - "80"
        - "443"

    - name: Allow SSH and management ports over Tailscale only
      community.general.ufw:
        rule: allow
        interface: tailscale0
        direction: in
        port: "{{ item }}"
        proto: tcp
      loop:
        - "22"
        - "{{ coolify_port }}"
        - "{{ gatus_port }}"
        - "{{ beszel_hub_port }}"
        - "{{ prometheus_port }}"

    - name: Enable UFW
      community.general.ufw:
        state: enabled
      notify: reload ufw

    # ---------------------------------------------------------------------
    # COOLIFY INSTALL
    # ---------------------------------------------------------------------
    - name: Check whether Coolify is already installed
      ansible.builtin.stat:
        path: /data/coolify/source/.env
      register: coolify_env

    - name: Install Coolify if missing
      ansible.builtin.shell: |
        curl -fsSL https://cdn.coollabs.io/coolify/install.sh | bash
      environment:
        ROOT_USERNAME: "{{ lookup('ansible.builtin.env', 'COOLIFY_ADMIN_USERNAME', default=undef()) }}"
        ROOT_USER_EMAIL: "{{ lookup('ansible.builtin.env', 'COOLIFY_ADMIN_EMAIL', default=undef()) }}"
        ROOT_USER_PASSWORD: "{{ lookup('ansible.builtin.env', 'COOLIFY_ADMIN_PASSWORD', default=undef()) }}"
      when: not coolify_env.stat.exists

    - name: Ensure deploy SSH user is in docker group
      ansible.builtin.user:
        name: "{{ lookup('ansible.builtin.env', 'HETZNER_SSH_USER', default=undef()) }}"
        groups: docker
        append: true

    - name: Wait for Coolify health endpoint
      ansible.builtin.uri:
        url: "{{ coolify_healthcheck_url }}"
        status_code: 200
      register: coolify_health
      retries: 30
      delay: 10
      until: coolify_health.status == 200

    - name: Ensure Coolify SSH keys directory exists
      ansible.builtin.file:
        path: /data/coolify/ssh/keys
        state: directory
        mode: "0755"

    - name: Generate Coolify SSH key pair for localhost connection
      ansible.builtin.command:
        cmd: ssh-keygen -t ed25519 -a 100 -f /data/coolify/ssh/keys/id.root@host.docker.internal -q -N "" -C root@coolify
        creates: /data/coolify/ssh/keys/id.root@host.docker.internal

    - name: Set ownership of Coolify SSH key pair
      ansible.builtin.file:
        path: "{{ item }}"
        owner: "9999"
        group: "9999"
        mode: "0600"
      loop:
        - /data/coolify/ssh/keys/id.root@host.docker.internal
        - /data/coolify/ssh/keys/id.root@host.docker.internal.pub

    - name: Ensure root .ssh directory exists
      ansible.builtin.file:
        path: /root/.ssh
        state: directory
        mode: "0700"

    - name: Authorize Coolify SSH public key for root login
      ansible.builtin.shell: |
        if ! grep -qFf /data/coolify/ssh/keys/id.root@host.docker.internal.pub /root/.ssh/authorized_keys 2>/dev/null; then
          cat /data/coolify/ssh/keys/id.root@host.docker.internal.pub >> /root/.ssh/authorized_keys
          chmod 600 /root/.ssh/authorized_keys
        fi

    - name: Read Coolify localhost SSH private key
      ansible.builtin.slurp:
        src: /data/coolify/ssh/keys/id.root@host.docker.internal
      register: coolify_ssh_key

    - name: Check if Coolify API is enabled
      ansible.builtin.uri:
        url: http://localhost:{{ coolify_port }}/api/v1/health
        method: GET
      register: coolify_health

    - name: Set Coolify API token
      ansible.builtin.set_fact:
        coolify_api_token: "{{ lookup('ansible.builtin.env', 'COOLIFY_ADMIN_TOKEN', default=undef()) }}"
      when: coolify_health.status == 200

    - name: Fetch existing Coolify keys
      ansible.builtin.uri:
        url: "http://localhost:{{ coolify_port }}/api/v1/security/keys"
        method: GET
        headers:
          Authorization: "Bearer {{ coolify_api_token }}"
        status_code: 200
        return_content: true
      register: coolify_keys
      when: coolify_api_token is defined

    - name: Register localhost SSH key with Coolify API if missing
      ansible.builtin.uri:
        url: "http://localhost:{{ coolify_port }}/api/v1/security/keys"
        method: POST
        headers:
          Authorization: "Bearer {{ coolify_api_token }}"
        body_format: json
        body:
          name: "root@host.docker.internal"
          description: "Coolify localhost SSH key"
          private_key: "{{ coolify_ssh_key.content | b64decode }}"
        status_code: 201
        return_content: true
      register: coolify_key_created
      when: coolify_keys.json | selectattr('name', 'equalto', 'root@host.docker.internal') | list | length == 0

    - name: Resolve localhost key UUID from created key
      ansible.builtin.set_fact:
        coolify_key_uuid: "{{ coolify_key_created.json.uuid }}"
      when: coolify_key_created is defined and coolify_key_created.json.uuid is defined

    - name: Resolve localhost key UUID from existing keys
      ansible.builtin.set_fact:
        coolify_key_uuid: "{{ (coolify_keys.json | selectattr('name', 'equalto', 'root@host.docker.internal') | first).uuid }}"
      when:
        - coolify_key_uuid is not defined
        - coolify_keys is defined
        - coolify_keys.json | selectattr('name', 'equalto', 'root@host.docker.internal') | list | length > 0

    - name: Fetch Coolify servers
      ansible.builtin.uri:
        url: "http://localhost:{{ coolify_port }}/api/v1/servers"
        method: GET
        headers:
          Authorization: "Bearer {{ coolify_api_token }}"
        status_code: 200
        return_content: true
      register: coolify_servers
      when: coolify_key_uuid is defined

    - name: Find localhost server UUID
      ansible.builtin.set_fact:
        coolify_server_uuid: "{{ (coolify_servers.json | selectattr('description', 'equalto', 'This is the server where Coolify is running on. Don''t delete this!') | first).uuid }}"
      when: coolify_api_token is defined and coolify_servers.status == 200

    - name: Get Docker bridge gateway IP for container-to-host connectivity
      ansible.builtin.shell: |
        docker network inspect bridge | jq -r '.[0].IPAM.Config[0].Gateway'
      register: docker_gateway
      changed_when: false
      failed_when: false

    - name: Assign localhost SSH key and correct IP to localhost server
      ansible.builtin.uri:
        url: "http://localhost:{{ coolify_port }}/api/v1/servers/{{ coolify_server_uuid }}"
        method: PATCH
        headers:
          Authorization: "Bearer {{ coolify_api_token }}"
        body_format: json
        body:
          private_key_uuid: "{{ coolify_key_uuid }}"
          ip: "{{ docker_gateway.stdout }}"
        status_code: 201
        return_content: true
      register: coolify_server_updated
      when: coolify_server_uuid is defined and docker_gateway.rc == 0

    - name: Validate localhost server
      ansible.builtin.uri:
        url: "http://localhost:{{ coolify_port }}/api/v1/servers/{{ coolify_server_uuid }}/validate"
        method: GET
        headers:
          Authorization: "Bearer {{ coolify_api_token }}"
        status_code: 201
        return_content: true
      register: coolify_server_validation
      when: coolify_server_uuid is defined and docker_gateway.rc == 0

    - name: Ensure Docker service is enabled and running
      ansible.builtin.systemd:
        name: docker
        state: started
        enabled: true

    - name: Ensure Docker Compose plugin is installed
      ansible.builtin.apt:
        name: docker-compose-plugin
        state: present

    # ---------------------------------------------------------------------
    # RETAINED MONITORING AND SECURITY SERVICES (DEPLOY NOW)
    # ---------------------------------------------------------------------
    - name: Ensure CrowdSec apt repository script is present
      ansible.builtin.get_url:
        url: https://packagecloud.io/install/repositories/crowdsec/crowdsec/script.deb.sh
        dest: /tmp/crowdsec-install.sh
        mode: "0755"

    - name: Configure CrowdSec apt repository
      ansible.builtin.command: bash /tmp/crowdsec-install.sh
      args:
        creates: /etc/apt/sources.list.d/crowdsec_crowdsec.list

    - name: Install CrowdSec and firewall bouncer
      ansible.builtin.apt:
        name:
          - crowdsec
          - crowdsec-firewall-bouncer-iptables
        state: present
        update_cache: true

    - name: Deploy CrowdSec acquisition config
      ansible.builtin.copy:
        src: ../security/crowdsec-config.yml
        dest: /etc/crowdsec/acquis.yaml
        mode: "0644"
      notify: restart crowdsec

    - name: Install CrowdSec collections
      ansible.builtin.command: cscli collections install crowdsecurity/linux crowdsecurity/traefik
      register: crowdsec_collections
      changed_when: "'already installed' not in (crowdsec_collections.stderr | default(''))"

    - name: Ensure CrowdSec is enabled and running
      ansible.builtin.systemd:
        name: crowdsec
        state: started
        enabled: true

    - name: Deploy Fail2Ban jail config
      ansible.builtin.copy:
        src: ../security/fail2ban-jail.local
        dest: /etc/fail2ban/jail.local
        mode: "0644"
      notify: restart fail2ban

    - name: Ensure Fail2Ban is enabled and running
      ansible.builtin.systemd:
        name: fail2ban
        state: started
        enabled: true

    - name: Create runtime directories for monitoring and backups
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        mode: "0755"
      loop:
        - /opt/gatus
        - /opt/prometheus
        - /opt/scripts
        - /opt/backups
        - /opt/beszel

    - name: Deploy Gatus config (fixed source path)
      ansible.builtin.copy:
        src: ../monitoring/gatus-config.yml
        dest: /opt/gatus/config.yml
        mode: "0644"

    - name: Deploy Gatus container
      community.docker.docker_container:
        name: gatus
        image: twinproduction/gatus:latest
        state: started
        restart_policy: unless-stopped
        recreate: false
        network_mode: host
        volumes:
          - /opt/gatus/config.yml:/config/config.yaml:ro
        env:
          APP_HEALTHCHECK_URL: "{{ app_healthcheck_url }}"
          GATUS_DISCORD_WEBHOOK_URL: "{{ lookup('ansible.builtin.env', 'GATUS_DISCORD_WEBHOOK_URL', default=undef()) }}"
          COOLIFY_HEALTHCHECK_URL: "{{ coolify_healthcheck_url }}"

    - name: Deploy Prometheus config
      ansible.builtin.copy:
        src: ../monitoring/prometheus.yml
        dest: /opt/prometheus/prometheus.yml
        mode: "0644"

    - name: Deploy Prometheus container
      community.docker.docker_container:
        name: prometheus
        image: prom/prometheus:latest
        state: started
        restart_policy: unless-stopped
        recreate: false
        network_mode: host
        volumes:
          - /opt/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
        command: ["--config.file=/etc/prometheus/prometheus.yml"]

    - name: Deploy node exporter container
      community.docker.docker_container:
        name: node-exporter
        image: quay.io/prometheus/node-exporter:latest
        state: started
        restart_policy: unless-stopped
        recreate: false
        network_mode: host
        pid_mode: host
        command:
          - --path.rootfs=/host
        volumes:
          - /:/host:ro,rslave

    - name: Deploy Beszel Hub container
      community.docker.docker_container:
        name: beszel-hub
        image: henrygd/beszel:latest
        state: started
        restart_policy: unless-stopped
        recreate: false
        ports:
          - "{{ beszel_hub_port }}:8090"

    - name: Deploy Beszel Agent container
      community.docker.docker_container:
        name: beszel-agent
        image: henrygd/beszel-agent:latest
        state: started
        restart_policy: unless-stopped
        recreate: false
        network_mode: host
        pid_mode: host
        privileged: true
        volumes:
          - /var/run/docker.sock:/var/run/docker.sock:ro

    - name: Install backup script
      ansible.builtin.copy:
        src: ../scripts/backup.sh
        dest: /opt/scripts/backup.sh
        mode: "0750"

    - name: Install backup wrapper script
      ansible.builtin.copy:
        src: ../scripts/run-backup.sh
        dest: /opt/scripts/run-backup.sh
        mode: "0750"

    - name: Install Django session cleanup script
      ansible.builtin.copy:
        src: ../scripts/clear-django-sessions.sh
        dest: /opt/scripts/clear-django-sessions.sh
        mode: "0750"

    - name: Create backup BWS access token file
      ansible.builtin.copy:
        dest: /opt/backups/.bws_token
        content: "{{ bws_access_token | default(lookup('ansible.builtin.env', 'BWS_ACCESS_TOKEN', default='')) }}\n"
        owner: root
        group: root
        mode: 0600


    - name: Configure daily backup cron
      ansible.builtin.cron:
        name: neuromancers-daily-backup
        user: root
        minute: "0"
        hour: "2"
        job: "/opt/scripts/run-backup.sh"

    - name: Configure Django session cleanup cron
      ansible.builtin.cron:
        name: neuromancers-django-clearsessions
        user: root
        minute: "15"
        hour: "2"
        job: "/opt/scripts/clear-django-sessions.sh"

    # ---------------------------------------------------------------------
    # VALIDATION
    # ---------------------------------------------------------------------
    - name: Validate Coolify health
      ansible.builtin.uri:
        url: "{{ coolify_healthcheck_url }}"
        status_code: 200

    - name: Validate required services are running
      ansible.builtin.service_facts:

    - name: Assert key services are active
      ansible.builtin.assert:
        that:
          - ansible_facts.services['tailscaled.service'].state == 'running'
          - ansible_facts.services['fail2ban.service'].state == 'running'
          - ansible_facts.services['crowdsec.service'].state == 'running'
        fail_msg: "One or more required services are not running (tailscaled, fail2ban, crowdsec)."

    - name: Validate UFW is active
      ansible.builtin.command: ufw status
      register: ufw_status
      changed_when: false

    - name: Assert UFW is active
      ansible.builtin.assert:
        that:
          - "'Status: active' in ufw_status.stdout"
        fail_msg: "UFW is not active."

    - name: Validate retained containers are running
      ansible.builtin.command: docker ps --format '{{ '{{' }}.Names{{ '}}' }}'
      register: running_containers
      changed_when: false

    - name: Assert retained containers are running
      ansible.builtin.assert:
        that:
          - "'gatus' in running_containers.stdout"
          - "'prometheus' in running_containers.stdout"
          - "'node-exporter' in running_containers.stdout"
          - "'beszel-hub' in running_containers.stdout"
          - "'beszel-agent' in running_containers.stdout"
        fail_msg: "One or more retained containers are missing."

    - name: Smoke - public health endpoint returns healthy DB and Redis
      ansible.builtin.uri:
        url: "{{ app_healthcheck_url }}"
        return_content: true
      register: public_health
      tags:
        - smoke

    - name: Smoke - assert public health content is healthy
      ansible.builtin.assert:
        that:
          - public_health.status == 200
          - public_health.json.status == 'ok'
          - public_health.json.database == 'ok'
          - public_health.json.redis == 'ok'
        fail_msg: "Public application health endpoint is not healthy."
      tags:
        - smoke

    - name: Smoke - inspect running application containers
      ansible.builtin.command: docker ps --format '{{ '{{' }}.Image{{ '}}' }} {{ '{{' }}.Names{{ '}}' }}'
      register: app_containers
      changed_when: false
      tags:
        - smoke

    - name: Smoke - assert Celery worker and beat are present
      ansible.builtin.assert:
        that:
          - app_containers.stdout is search('neuromancers_network_production_celeryworker')
          - app_containers.stdout is search('neuromancers_network_production_celerybeat')
          - app_containers.stdout is search('neuromancers_network_production_redis') or app_containers.stdout is search('redis:8.6')
        fail_msg: "Celery worker, Celery beat, or Redis container is not present after deployment."
      tags:
        - smoke

  handlers:
    - name: reload ufw
      community.general.ufw:
        state: reloaded

    - name: restart crowdsec
      ansible.builtin.systemd:
        name: crowdsec
        state: restarted

    - name: restart fail2ban
      ansible.builtin.systemd:
        name: fail2ban
        state: restarted
