# Schedule maintenance scripts via cron
---
- name: Create scripts directory
  ansible.builtin.file:
    path: /opt/scripts
    state: directory
    mode: "0755"

- name: Copy clear-django-sessions script
  ansible.builtin.copy:
    src: ../scripts/clear-django-sessions.sh
    dest: /opt/scripts/clear-django-sessions.sh
    mode: "0755"

- name: Schedule clear-django-sessions cron job
  ansible.builtin.cron:
    name: "clear-django-sessions"
    job: "/opt/scripts/clear-django-sessions.sh"
    hour: "3"
    minute: "0"

- name: Copy refresh-tailscale-certs.sh script
  ansible.builtin.copy:
    src: ../scripts/refresh-tailscale-certs.sh
    dest: /opt/scripts/refresh-tailscale-certs.sh
    mode: "0755"

- name: Schedule refresh-tailscale-certs cron job (monthly)
  ansible.builtin.cron:
    name: "refresh-tailscale-certs"
    job: "/opt/scripts/refresh-tailscale-certs.sh"
    month: "*/1"
  env:
    TS_APP_DOMAIN: "{{ tailscale_app_domain }}"
    TS_METRICS_DOMAIN: "{{ tailscale_metrics_domain }}"
    TS_MONITOR_DOMAIN: "{{ tailscale_monitor_domain }}"
    TS_PAAS_DOMAIN: "{{ tailscale_paas_domain }}"
