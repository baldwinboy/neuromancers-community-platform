# Prometheus scrape configuration for Neuromancers Network
# Deployed alongside the monitoring stack; scrapes application metrics
# exposed by Django via django-prometheus or similar.

global:
  scrape_interval: 30s
  evaluation_interval: 30s

scrape_configs:
  - job_name: "prometheus"
    metrics_path: "/metrics/"
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: "node-exporter"
    static_configs:
      - targets: ["localhost:9100"]
