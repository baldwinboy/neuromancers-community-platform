name: Backup
on:
  schedule:
    - cron: "0 2 * * *"

jobs:
  backup:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      matrix:
        include:
          - environment: production
            branch: main
          - environment: staging
            branch: staging
    environment: ${{ matrix.environment }}
    env:
      BWS_ACCESS_TOKEN: ${{ secrets.BWS_ACCESS_TOKEN }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ matrix.branch }}
      - uses: actions/setup-python@v6
      - run: pip install ansible==13.6.*
      - name: Install latest Bitwarden Secrets Manager CLI
        run: |
          LATEST_TAG=$(curl -s https://api.github.com/repos/bitwarden/sdk-sm/releases/latest \
          | jq -r '.tag_name')
          VERSION=${LATEST_TAG#*-v}
          TAG="bws-v${VERSION}"
          ASSET_NAME="bws-x86_64-unknown-linux-gnu-${VERSION}.zip"
          DOWNLOAD_URL="https://github.com/bitwarden/sdk-sm/releases/download/${TAG}/${ASSET_NAME}"
          curl -L -o bws.zip "$DOWNLOAD_URL"
          unzip bws.zip -d /usr/local/bin
          rm bws.zip
      - id: inject-secrets
        name: Inject secrets from Bitwarden Secrets Manager
        run: |
          REQUIRED_SECRETS=(
            "HETZNER_SSH_HOST"
            "HETZNER_SSH_PRIVATE_KEY"
            "HETZNER_SSH_USER"
            "TS_OAUTH_CLIENT_ID"
            "TS_OAUTH_CLIENT_SECRET"
            "TAILSCALE_TAG"
            "TAILSCALE_AUTH_KEY"
          )

          secrets_json="$(bws secret list)"
          missing=()

          for key in "${REQUIRED_SECRETS[@]}"; do
            value="$(jq -r --arg k "$key" '.[] | select(.key==$k) | .value' <<< "$secrets_json")"
            if [[ -z "$value" || "$value" == "null" ]]; then
              missing+=("$key")
              continue
            fi

            if [[ "$key" == "HETZNER_SSH_PRIVATE_KEY" ]]; then
              echo "::add-mask::$value"
              {
                echo "$key<<EOF"
                echo "$value"
                echo "EOF"
              } >> "$GITHUB_OUTPUT"
              continue
            fi

            echo "::add-mask::$value"
            echo "$key=$value" >> "$GITHUB_OUTPUT"
          done

          if (( ${#missing[@]} > 0 )); then
            echo "::error::Missing required Bitwarden secrets: ${missing[*]}"
            exit 1
          fi
      - name: Connect to tailnet
        uses: Pikachews/tailscale-action@main
        with:
          oauth-client-id: ${{ steps.inject-secrets.outputs.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ steps.inject-secrets.outputs.TS_OAUTH_CLIENT_SECRET }}
          tags: ${{ steps.inject-secrets.outputs.TAILSCALE_TAG }}
      - name: Create SSH key file for Ansible
        env:
          HETZNER_SSH_PRIVATE_KEY: ${{ steps.inject-secrets.outputs.HETZNER_SSH_PRIVATE_KEY }}
        run: |
          printf '%s\n' "$HETZNER_SSH_PRIVATE_KEY" > infra/inventory/ssh_key
          chmod 600 infra/inventory/ssh_key
      - name: Install Ansible Galaxy requirements
        run: ansible-galaxy collection install -r infra/galaxy/requirements.yml --force
      - name: Play Ansible Playbook
        env:
          ANSIBLE_HOST_KEY_CHECKING: "false"
        run: |
          EXTRA="bws_access_token=$BWS_ACCESS_TOKEN git_environment=${{ matrix.environment }}"

          bws run -- "ansible-playbook infra/playbooks/backup_application.yml --skip-tags smoke --inventory infra/inventory/hosts.yml --private-key infra/inventory/ssh_key $EXTRA" 2>&1 | \
            sed -E 's/[a-zA-Z0-9._%+-]+@[0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3}/[REDACTED]/g; s/[0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3}/[REDACTED]/g'
