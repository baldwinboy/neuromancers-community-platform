name: Deploy Infrastructure

on:
  workflow_run:
    workflows: [CI]
    types:
      - completed
    branches: [main, staging]

concurrency:
  group: deploy-${{ github.event.workflow_run.head_branch }}
  cancel-in-progress: true

jobs:
  deploy:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    environment: ${{ github.event.workflow_run.head_branch == 'main' && 'production' || 'staging' }}
    env:
      DEPLOY_BRANCH: ${{ github.event.workflow_run.head_branch }}
      DEPLOY_SHA: ${{ github.event.workflow_run.head_sha }}
      BWS_ACCESS_TOKEN: ${{ secrets.BWS_ACCESS_TOKEN }}
    steps:
      - name: Checkout deployment revision
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
      - uses: actions/setup-python@v7
      - run: pip install ansible==13.6.*
      - name: Install latest Bitwarden Secrets Manager CLI
        run: |
          # Fetch the latest release tag from GitHub API
          LATEST_TAG=$(curl -s https://api.github.com/repos/bitwarden/sdk-sm/releases/latest \
          | jq -r '.tag_name')

          # Get only the version number ('xxx-v1.2.3' -> '1.2.3')
          VERSION=${LATEST_TAG#*-v}

          # Construct the download URL for the Linux AMD64 binary
          TAG="bws-v${VERSION}"
          ASSET_NAME="bws-x86_64-unknown-linux-gnu-${VERSION}.zip"
          DOWNLOAD_URL="https://github.com/bitwarden/sdk-sm/releases/download/${TAG}/${ASSET_NAME}"

          # Download and unzip the binary
          curl -L -o bws.zip "$DOWNLOAD_URL"
          unzip bws.zip -d /usr/local/bin
          rm bws.zip
      - name: Validate BWS_ACCESS_TOKEN is set
        run: |
          if [[ -z "$BWS_ACCESS_TOKEN" ]]; then
            echo "::error::BWS_ACCESS_TOKEN is not set in GitHub secrets"
            exit 1
          fi
      - id: inject-secrets
        name: Inject secrets from Bitwarden Secrets Manager
        run: |
          REQUIRED_SECRETS=(
            "HETZNER_SSH_HOST"
            "HETZNER_SSH_PRIVATE_KEY"
            "HETZNER_SSH_USER"
            "TS_OAUTH_CLIENT_ID"
            "TS_OAUTH_CLIENT_SECRET"
            "TAILSCALE_TAG"
            "TAILSCALE_AUTH_KEY"
            "COOLIFY_ADMIN_USERNAME"
            "COOLIFY_ADMIN_EMAIL"
            "COOLIFY_ADMIN_PASSWORD"
            "GATUS_DISCORD_WEBHOOK_URL"
            "AWS_ENDPOINT_URL_S3"
            "AWS_S3_BUCKET_NAME"
            "AWS_ACCESS_KEY_ID"
            "AWS_SECRET_ACCESS_KEY"
            "RETENTION_DAYS"
            "POSTGRES_DB"
            "POSTGRES_USER"
            "POSTGRES_PASSWORD"
            "POSTGRES_HOST"
            "POSTGRES_PORT"
            "REDIS_URL"
            "DJANGO_SECRET_KEY"
            "CELERY_FLOWER_USER"
            "CELERY_FLOWER_PASSWORD"
          )

          secrets_json="$(bws secret list)"
          missing=()

          for key in "${REQUIRED_SECRETS[@]}"; do
            value="$(jq -r --arg k "$key" '.[] | select(.key==$k) | .value' <<< "$secrets_json")"
            if [[ -z "$value" || "$value" == "null" ]]; then
              missing+=("$key")
              continue
            fi

            # Only export values needed by later workflow steps.
            case "$key" in
              HETZNER_SSH_PRIVATE_KEY)
                echo "::add-mask::$value"
                {
                  echo "$key<<EOF"
                  echo "$value"
                  echo "EOF"
                } >> "$GITHUB_OUTPUT"
                ;;
              TS_OAUTH_CLIENT_ID|TS_OAUTH_CLIENT_SECRET|TAILSCALE_TAG)
                echo "::add-mask::$value"
                echo "$key=$value" >> "$GITHUB_OUTPUT"
                ;;
            esac
          done

          if (( ${#missing[@]} > 0 )); then
            echo "::error::Missing required Bitwarden secrets: ${missing[*]}"
            exit 1
          fi
      - name: Connect to tailnet
        uses: Pikachews/tailscale-action@main
        with:
          oauth-client-id: ${{ steps.inject-secrets.outputs.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ steps.inject-secrets.outputs.TS_OAUTH_CLIENT_SECRET }}
          tags: ${{ steps.inject-secrets.outputs.TAILSCALE_TAG }}
      - name: Create SSH key file for Ansible
        env:
          HETZNER_SSH_PRIVATE_KEY: ${{ steps.inject-secrets.outputs.HETZNER_SSH_PRIVATE_KEY }}
        run: |
          printf '%s\n' "$HETZNER_SSH_PRIVATE_KEY" > infra/inventory/ssh_key
          chmod 600 infra/inventory/ssh_key
      - name: Install Ansible Galaxy requirements
        run: ansible-galaxy collection install -r infra/galaxy/requirements.yml --force
      - name: Play Ansible Playbook
        env:
          ANSIBLE_HOST_KEY_CHECKING: "false"
          BWS_ACCESS_TOKEN: ${{ secrets.BWS_ACCESS_TOKEN }}
        run: |
          EXTRA="BWS_ACCESS_TOKEN=$BWS_ACCESS_TOKEN git_branch=$DEPLOY_BRANCH git_commit_sha=$DEPLOY_SHA git_repository=$GITHUB_SERVER_URL/$GITHUB_REPOSITORY"

          if [[ "$DEPLOY_BRANCH" == "main" ]]; then
            EXTRA="$EXTRA git_environment=production"
          else
            EXTRA="$EXTRA git_environment=staging"
          fi

          bws run -- "ansible-playbook infra/playbooks/site.yml --skip-tags smoke --inventory infra/inventory/hosts.yml --private-key infra/inventory/ssh_key --extra-vars \"$EXTRA\"" 2>&1 | \
            sed -E 's/[a-zA-Z0-9._%+-]+@[0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3}/[REDACTED]/g; s/[0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3}/[REDACTED]/g'
