services:
  django:
    image: ghcr.io/baldwinboy/neuromancers-network:${DOCKER_TAG:-latest}
    depends_on:
      - postgres
      - redis
    environment:
      - BWS_ACCESS_TOKEN=${BWS_ACCESS_TOKEN}
    command: /start

  postgres:
    image: ghcr.io/baldwinboy/neuromancers-network-postgres:${DOCKER_TAG:-latest}
    volumes:
      - postgres-data:/var/lib/postgresql/18/docker
      - postgres-backups:/backups
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_HOST=${POSTGRES_HOST}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_PORT=${POSTGRES_PORT}
      - POSTGRES_USER=${POSTGRES_USER}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_S3_BUCKET_NAME=${AWS_S3_BUCKET_NAME}
      - AWS_ENDPOINT_URL_S3=${AWS_ENDPOINT_URL_S3}
      - RETENTION_DAYS=${RETENTION_DAYS}

  redis:
    image: docker.io/redis:8.8
    volumes:
      - redis-data:/data

  celeryworker:
    image: ghcr.io/baldwinboy/neuromancers-network:${DOCKER_TAG:-latest}
    depends_on: [postgres, redis]
    environment:
      - BWS_ACCESS_TOKEN=${BWS_ACCESS_TOKEN}
    command: /start-celeryworker

  celerybeat:
    image: ghcr.io/baldwinboy/neuromancers-network:${DOCKER_TAG:-latest}
    depends_on: [postgres, redis]
    environment:
      - BWS_ACCESS_TOKEN=${BWS_ACCESS_TOKEN}
    command: /start-celerybeat

  flower:
    image: ghcr.io/baldwinboy/neuromancers-network:${DOCKER_TAG:-latest}
    depends_on: [postgres, redis]
    ports:
      - "5555:5555"
    environment:
      - BWS_ACCESS_TOKEN=${BWS_ACCESS_TOKEN}
    command: /start-flower

  prometheus:
    image: docker.io/prom/prometheus:main-distroless
    volumes:
      - prometheus-data:/prometheus
    configs:
      - source: prometheus-config
        target: /etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    depends_on:
      - django

configs:
  prometheus-config:
    file: ./prometheus.yml

volumes:
  postgres-data:
  postgres-backups:
  redis-data:
  prometheus-data:
