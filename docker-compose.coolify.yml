services:
  django:
    image: ghcr.io/baldwinboy/neuromancers-network:${DOCKER_TAG:-latest}
    expose:
      - "5000"
    ports:
      - "8080:5000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - BWS_ACCESS_TOKEN=${BWS_ACCESS_TOKEN}
    command: /start
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:5000/api/health')",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  postgres:
    image: ghcr.io/baldwinboy/neuromancers-network-postgres:${DOCKER_TAG:-latest}
    volumes:
      - postgres-data:/var/lib/postgresql/18/docker
      - postgres-backups:/backups
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_HOST=${POSTGRES_HOST}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_PORT=${POSTGRES_PORT}
      - POSTGRES_USER=${POSTGRES_USER}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_S3_BUCKET_NAME=${AWS_S3_BUCKET_NAME}
      - AWS_ENDPOINT_URL_S3=${AWS_ENDPOINT_URL_S3}
      - RETENTION_DAYS=${RETENTION_DAYS}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: docker.io/redis:8.8
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  celeryworker:
    image: ghcr.io/baldwinboy/neuromancers-network:${DOCKER_TAG:-latest}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      django:
        condition: service_healthy
    environment:
      - BWS_ACCESS_TOKEN=${BWS_ACCESS_TOKEN}
    command: /start-celeryworker

  celerybeat:
    image: ghcr.io/baldwinboy/neuromancers-network:${DOCKER_TAG:-latest}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      django:
        condition: service_healthy
    environment:
      - BWS_ACCESS_TOKEN=${BWS_ACCESS_TOKEN}
    command: /start-celerybeat

  flower:
    image: ghcr.io/baldwinboy/neuromancers-network:${DOCKER_TAG:-latest}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      django:
        condition: service_healthy
    ports:
      - "5555:5555"
    environment:
      - BWS_ACCESS_TOKEN=${BWS_ACCESS_TOKEN}
    command: /start-flower

  prometheus:
    image: docker.io/prom/prometheus:main-distroless
    volumes:
      - prometheus-data:/prometheus
    configs:
      - source: prometheus-config
        target: /etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    depends_on:
      django:
        condition: service_healthy

configs:
  prometheus-config:
    content: |
      global:
        scrape_interval: 15s
        evaluation_interval: 15s

      scrape_configs:
        - job_name: django
          static_configs:
            - targets: ["django:5000"]
          metrics_path: /monitoring/metrics
        - job_name: 'coolify-sentinel'
          static_configs:
            - targets: ['host.docker.internal:8888']
          metrics_path: '/api/metrics'

volumes:
  postgres-data:
  postgres-backups:
  redis-data:
  prometheus-data:
