# fly.toml app configuration file generated for neuromancers-community-platform on 2026-03-02T13:02:45Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'neuromancers-community-platform'
primary_region = 'lhr'
console_command = '/app/manage.py shell'

[build]

[deploy]
  # Migrations run in entrypoint.sh after Tailscale is up
  # release_command runs before the app starts, without Tailscale

[env]
  PORT = '8000'

[processes]
  app = "/app/entrypoint.sh"

# No [http_service] - we don't want public HTTP access
# Access is Tailscale-only

[[vm]]
  memory = '1gb'
  cpus = 1
  memory_mb = 1024
