# fly.toml app configuration file generated for neuromancers-community-platform on 2026-03-02T13:02:45Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#
# TAILSCALE-ONLY DEPLOYMENT:
# - No [http_service] or [[services]] = no public Fly.io proxy
# - Access only via Tailscale IP or MagicDNS hostname
#

app = 'neuromancers-community-platform'
primary_region = 'lhr'
console_command = '/app/manage.py shell'

[build]

[deploy]
  # Migrations run in entrypoint.sh after Tailscale connects
  # (release_command runs before app starts, without network access to Tailscale)

[env]
  PORT = '8000'
  ENVIRONMENT = 'production'

# No [http_service] - Tailscale-only access
# No [[services]] - no public port exposure

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
