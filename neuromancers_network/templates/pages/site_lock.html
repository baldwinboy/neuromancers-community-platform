{% load i18n %}

<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>{% trans "Site Locked" %}</title>
        <style>
          body {
            font-family: sans-serif;
            margin: 0;
            padding: 2rem;
            background: #f5f5f5;
          }

          .card {
            max-width: 480px;
            margin: 4rem auto;
            background: #fff;
            border: 1px solid #ddd;
            border-radius: 10px;
            padding: 1.5rem;
          }

          h1 {
            margin-top: 0;
          }

          .msg {
            color: #555;
            margin-bottom: 1rem;
          }

          .error {
            color: #b00020;
            margin-bottom: 1rem;
          }

          label {
            display: block;
            margin-bottom: 0.5rem;
          }

          input[type="password"] {
            width: 100%;
            padding: 0.6rem;
            box-sizing: border-box;
          }

          button {
            margin-top: 1rem;
            padding: 0.6rem 1rem;
            cursor: pointer;
          }
        </style>
    </head>
    <body>
        <div class="card">
            <h1>{% trans "This site is currently private" %}</h1>
            <p class="msg">{{ maintenance_message|default:"Please enter the site password to continue." }}</p>
            {% if error %}<p class="error">{{ error }}</p>{% endif %}
            <form method="post">
                {% csrf_token %}
                <input type="hidden" name="next" value="{{ next }}" />
                <label for="id_password">{% trans "Password" %}</label>
                <input id="id_password" name="password" type="password" required />
                <button type="submit">{% trans "Unlock" %}</button>
            </form>
        </div>
    </body>
</html>
